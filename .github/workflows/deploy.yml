name: build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      # Advisory only: the workspace is not lint-clean yet, and a style lint
      # must not be able to block a deploy. Tests are the hard gate.
      - run: cargo clippy --workspace --all-targets
        continue-on-error: true
      - run: cargo test --workspace --locked

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart on the VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/arb
            docker compose pull arb
            docker compose up -d
            docker image prune -f

      - name: Verify the deployed instance is healthy
        run: |
          for i in $(seq 1 20); do
            if curl -fsS "https://${{ secrets.DEPLOY_DOMAIN }}/healthz"; then
              echo "healthy"; exit 0
            fi
            sleep 6
          done
          echo "::error::/healthz did not come up within 2 minutes"
          exit 1
